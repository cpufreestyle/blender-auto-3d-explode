<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AI 3D Viewer</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column}header{padding:20px;background:rgba(0,0,0,0.3)}.models{display:flex;gap:10px;padding:15px;flex-wrap:wrap}.model-btn{padding:10px 20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;border-radius:8px;cursor:pointer}.model-btn:hover,.model-btn.active{background:linear-gradient(135deg,#4a9eff,#8f7aff);border-color:transparent}#canvas{flex:1}</style></head><body><header><h1>AI 3D Model Viewer</h1></header><div class="models"><button class="model-btn active" onclick="load("'real_elephant.glb',this)">Elephant</button><button class="model-btn" onclick="load("'lego_superman.glb',this)">Superman</button><button class="model-btn" onclick="load("'lego_batman.glb',this)">Batman</button><button class="model-btn" onclick="load("'red_car.glb',this)">Car</button><button class="model-btn" onclick="load("'basketball.glb',this)">Basketball</button></div><div id="canvas"></div><script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script><script type="module">import*as THREE from"'three';import{OrbitControls}from"'three/addons/controls/OrbitControls.js';import{GLTFLoader}from"'three/addons/loaders/GLTFLoader.js';let scene,camera,renderer,controls,model;init();load("'real_elephant.glb',document.querySelector("'.model-btn'));function init(){const container=document.getElementById("'canvas');scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a2e);camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(container.clientWidth,container.clientHeight);container.appendChild(renderer.domElement);controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=true;scene.add(new THREE.AmbientLight(0xffffff,0.4));const dir=new THREE.DirectionalLight(0xffffff,1);dir.position.set(5,10,7);scene.add(dir);const ground=new THREE.Mesh(new THREE.PlaneGeometry(50,50),new THREE.MeshStandardMaterial({color:0x16213e}));ground.rotation.x=-Math.PI/2;scene.add(ground);animate();window.addEventListener("'resize',()=>{camera.aspect=container.clientWidth/container.clientHeight;camera.updateProjectionMatrix();renderer.setSize(container.clientWidth,container.clientHeight)})}window.load=function(name,btn){document.querySelectorAll("'.model-btn').forEach(b=>b.classList.remove("'active'));btn.classList.add("'active');if(model)scene.remove(model);new GLTFLoader().load("'models/'+name,gltf=>{model=gltf.scene;const box=new THREE.Box3().setFromObject(model);const c=box.getCenter(new THREE.Vector3());const s=box.getSize(new THREE.Vector3());model.position.sub(c);model.position.y+=s.y/2;model.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true}});scene.add(model);const d=Math.max(s.x,s.y,s.z);camera.position.set(d*2,d*1.2,d*2);controls.target.set(0,s.y/2,0);controls.update()})}function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}</script></body></html>
